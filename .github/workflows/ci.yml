name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify build outputs
        run: |
          test -f dist/index.js || (echo "Missing dist/index.js" && exit 1)
          test -f dist/experimental/index.js || (echo "Missing dist/experimental/index.js" && exit 1)
          test -f dist/core/index.js || (echo "Missing dist/core/index.js" && exit 1)
          echo "✅ All critical build outputs present"
